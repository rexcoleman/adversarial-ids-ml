name: adversarial-ids
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10.13
  - numpy=1.24.3
  - pandas=2.0.3
  - scikit-learn=1.3.2
  - matplotlib=3.8.2
  - seaborn=0.13.0
  - scipy=1.11.4
  - joblib=1.3.2
  - setuptools<72  # ART 1.17.1 needs pkg_resources (removed in setuptools 72+)
  - pip:
    - xgboost==2.0.3
    - adversarial-robustness-toolbox==1.17.1
    - torch==2.1.2+cpu
    - --extra-index-url https://download.pytorch.org/whl/cpu
    - tqdm==4.66.1
    - pyyaml==6.0.1
    - pytest==7.4.4
